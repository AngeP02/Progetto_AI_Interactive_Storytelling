<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Eden Detective - Interactive Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #16213e 100%);
            color: #00ff88;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            text-shadow: 0 0 20px #00ff88;
            margin-bottom: 10px;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 20px #00ff88; }
            50% { text-shadow: 0 0 40px #ff00ff, 0 0 60px #00ffff; }
        }

        .progress {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #333;
            transition: all 0.3s;
        }

        .progress-dot.active {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .scene-container {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff88;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 300px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.1);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scene-text {
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .state-display {
            background: rgba(0, 0, 0, 0.5);
            border-left: 3px solid #ff00ff;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #ff00ff;
            max-height: 120px;
            overflow-y: auto;
        }

        .state-title {
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .state-fact {
            margin: 3px 0;
            padding-left: 10px;
        }

        .choices-container {
            display: grid;
            gap: 15px;
            margin-top: 30px;
        }

        .choice-btn {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 20px;
            text-align: left;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.3), transparent);
            transition: left 0.5s;
        }

        .choice-btn:hover {
            background: rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            transform: translateX(10px);
        }

        .choice-btn:hover::before {
            left: 100%;
        }

        .choice-number {
            color: #ff00ff;
            font-weight: bold;
            margin-right: 10px;
        }

        .consequence-text {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            padding: 20px;
            margin-top: 20px;
            display: none;
            color: #00ffff;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 500px;
            }
        }

        .consequence-text.show {
            display: block;
        }

        .consequence-title {
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #ffff00;
        }

        .action-name {
            font-size: 0.8em;
            color: #ff00ff;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        .next-button {
            background: linear-gradient(135deg, #00ff88, #00ffff);
            color: #0a0e27;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
        }

        .next-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .next-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .story-end {
            text-align: center;
            padding: 40px;
            font-size: 1.5em;
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00ff88;
        }

        .spinner {
            border: 4px solid rgba(0, 255, 136, 0.2);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            color: #ff0000;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ NEO-EDEN DETECTIVE ⚡</h1>
            <p>Una storia interattiva guidata da logica PDDL</p>
            <div class="progress" id="progressBar"></div>
        </div>

        <div id="loadingScreen" class="loading">
            <div class="spinner"></div>
            <p>Caricamento della storia...</p>
        </div>

        <div id="storyContainer" class="hidden">
            <div class="scene-container">
                <div class="action-name" id="actionName"></div>
                <div class="scene-text" id="sceneText"></div>
                <div class="state-display" id="stateDisplay"></div>
            </div>

            <div class="choices-container" id="choicesContainer"></div>

            <div id="consequenceArea"></div>

            <button class="next-button" id="nextButton" style="display: none;">
                Continua alla prossima scena →
            </button>
        </div>

        <div id="errorScreen" class="hidden"></div>
    </div>

    <script>
        class InteractiveStoryPlayer {
            constructor(jsonPath) {
                this.jsonPath = jsonPath;
                this.storyData = null;
                this.currentBranchIndex = 0;
                this.selectedChoice = null;
                this.init();
            }

            async init() {
                try {
                    const response = await fetch(this.jsonPath);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    this.storyData = await response.json();
                    this.displayLoadingComplete();
                    this.renderBranch();
                } catch (error) {
                    this.showError(`Errore caricamento storia: ${error.message}`);
                }
            }

            displayLoadingComplete() {
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('storyContainer').classList.remove('hidden');
                this.updateProgress();
            }

            updateProgress() {
                const progressBar = document.getElementById('progressBar');
                progressBar.innerHTML = '';
                const total = this.storyData.story_branches.length;

                for (let i = 0; i < total; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'progress-dot';
                    if (i === this.currentBranchIndex) {
                        dot.classList.add('active');
                    }
                    progressBar.appendChild(dot);
                }
            }

            renderBranch() {
                if (this.currentBranchIndex >= this.storyData.story_branches.length) {
                    this.showStoryEnd();
                    return;
                }

                const branch = this.storyData.story_branches[this.currentBranchIndex];
                this.renderScene(branch);
            }

            renderScene(branch) {
                document.getElementById('actionName').textContent = `[${branch.pddl_action}]`;
                document.getElementById('sceneText').textContent = branch.scene;

                // Mostra stato PDDL
                const stateDisplay = document.getElementById('stateDisplay');
                stateDisplay.innerHTML = '<div class="state-title">📊 Stato del Mondo PDDL:</div>';
                if (branch.current_state && branch.current_state.length > 0) {
                    branch.current_state.forEach(fact => {
                        const factDiv = document.createElement('div');
                        factDiv.className = 'state-fact';
                        factDiv.textContent = `→ ${fact}`;
                        stateDisplay.appendChild(factDiv);
                    });
                } else {
                    stateDisplay.innerHTML += '<div class="state-fact">-- Nessun fatto rilevante --</div>';
                }

                // Renderizza scelte
                this.renderChoices(branch.choices);

                // Reset state
                this.selectedChoice = null;
                document.getElementById('nextButton').style.display = 'none';
                document.getElementById('consequenceArea').innerHTML = '';
            }

            renderChoices(choices) {
                const container = document.getElementById('choicesContainer');
                container.innerHTML = '';

                choices.forEach((choice, index) => {
                    const choiceBtn = document.createElement('button');
                    choiceBtn.className = 'choice-btn';
                    choiceBtn.innerHTML = `<span class="choice-number">[${index + 1}]</span>${choice.text}`;

                    choiceBtn.addEventListener('click', () => this.selectChoice(choice, index));
                    container.appendChild(choiceBtn);
                });
            }

            selectChoice(choice, index) {
                this.selectedChoice = choice;

                // Mostra conseguenza
                const consequenceArea = document.getElementById('consequenceArea');
                consequenceArea.innerHTML = `
                    <div class="consequence-text show">
                        <div class="consequence-title">⚡ Conseguenza:</div>
                        <div>${choice.consequence}</div>
                        ${choice.resulting_state ? `
                            <div style="margin-top: 15px; opacity: 0.7;">
                                <strong>Nuovo Stato:</strong><br>
                                ${choice.resulting_state.map(f => `→ ${f}`).join('<br>')}
                            </div>
                        ` : ''}
                    </div>
                `;

                // Mostra bottone continua
                document.getElementById('nextButton').style.display = 'block';

                // Disabilita altre scelte
                document.querySelectorAll('.choice-btn').forEach((btn, i) => {
                    btn.disabled = i !== index;
                    btn.style.opacity = i === index ? '1' : '0.3';
                });
            }

            nextBranch() {
                this.currentBranchIndex++;
                this.updateProgress();
                this.renderBranch();
            }

            showStoryEnd() {
                document.getElementById('storyContainer').innerHTML = `
                    <div class="story-end">
                        <h2>✨ FINE DELLA STORIA ✨</h2>
                        <p style="margin-top: 20px; font-size: 1.2em;">
                            Hai completato questa trama di Neo-Eden.<br>
                            La verità rimane nell'ombra...
                        </p>
                        <button class="next-button" onclick="location.reload()" style="margin-top: 30px;">
                            Ricomincia dal Principio
                        </button>
                    </div>
                `;
            }

            showError(message) {
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('errorScreen').classList.remove('hidden');
                document.getElementById('errorScreen').innerHTML = `
                    <div class="error-message">${message}</div>
                `;
            }
        }

        // Carica quando il DOM è pronto
        document.addEventListener('DOMContentLoaded', () => {
            // Modifica il percorso al tuo file JSON
            const player = new InteractiveStoryPlayer('story_graph_interactive.json');

            document.getElementById('nextButton').addEventListener('click', () => {
                player.nextBranch();
            });
        });
    </script>
</body>
</html>
