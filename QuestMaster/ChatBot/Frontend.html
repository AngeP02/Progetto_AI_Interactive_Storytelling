<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestMaster - GPT Edition</title>
    <style>
        /* --- STILI IDENTICI AL TUO FILE ORIGINALE --- */
        /* Ho mantenuto i tuoi stili per non rompere il layout */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url("/static/img/SfondoChatbot.png");
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            height: 90vh;
            max-height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); /* Colore leggermente diverso per indicare GPT */
            color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3); }
        .header p { opacity: 0.9; font-size: 1.1em; }

        .connection-status {
            position: absolute;
            top: 10px;
            right: 20px;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-online { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid white; }
        .status-offline { background: rgba(220, 53, 69, 0.8); color: white; }

        /* Chat Styles */
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .message { max-width: 80%; padding: 15px 20px; border-radius: 18px; animation: slideIn 0.3s ease-out; line-height: 1.5; word-wrap: break-word; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .assistant-message { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #000; align-self: flex-start; border-bottom-left-radius: 5px; border: 1px solid #e1e8ed; }
        .user-message { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
        .error-message { background: #ff6b6b; color: white; align-self: flex-start; }

        /* Input Area */
        .input-area { padding: 20px; background: rgba(247, 250, 252, 0.9); border-top: 1px solid rgba(0,0,0,0.1); }
        .text-input-container { display: none; margin-bottom: 15px; flex-direction: row; gap: 10px; }
        .text-input-container.active { display: flex; }
        .text-input-container input { flex: 1; padding: 12px 15px; border: 2px solid #e1e8ed; border-radius: 25px; font-size: 16px; outline: none; }
        .send-button { background: #4facfe; color: white; border: none; padding: 12px 20px; border-radius: 25px; cursor: pointer; }

        .options-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .option-button {
            background: white; color: #4facfe; border: 2px solid #4facfe;
            padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .option-button:hover { background: #4facfe; color: white; transform: translateY(-2px); }

        /* Loading & Progress */
        .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .loading-overlay.active { display: flex; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .progress-tracker { display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 10px; margin-bottom: 15px; width: 100%; }
        .progress-step { display: flex; flex-direction: column; align-items: center; font-size: 0.8em; opacity: 0.5; }
        .progress-step.running { opacity: 1; color: #e67e22; font-weight: bold; }
        .progress-step.complete { opacity: 1; color: #27ae60; font-weight: bold; }
        .progress-step.error { opacity: 1; color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="connection-status" id="connectionStatus">Check Connection...</div>
            <h1>QuestMaster AI</h1>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <!-- Typing indicator semplificato -->
            <div class="message assistant-message" id="typingIndicator" style="display:none;">...</div>
        </div>

        <div class="input-area">
            <div class="text-input-container" id="textInputContainer">
                <input type="text" id="textInput" placeholder="Type here...">
                <button class="send-button" id="sendButton" onclick="sendTextMessage()">Send</button>
            </div>
            <div class="options-container" id="optionsContainer"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000';

        class QuestMasterClient {
            constructor() {
                this.sessionId = 'sess_' + Date.now();
                this.isLoading = false;
                this.currentStep = 'welcome';

                // Elementi
                this.chatMessages = document.getElementById('chatMessages');
                this.optionsContainer = document.getElementById('optionsContainer');
                this.textInputContainer = document.getElementById('textInputContainer');
                this.textInput = document.getElementById('textInput');
                this.loadingOverlay = document.getElementById('loadingOverlay');

                this.init();
            }

            async init() {
                this.checkConnection();
                this.startWelcome();

                // Event Listeners
                this.textInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.sendTextMessage();
                });
            }

            async checkConnection() {
                const statusEl = document.getElementById('connectionStatus');
                try {
                    const res = await fetch(`${API_BASE_URL}/api/health`);
                    const data = await res.json();
                    if (data.connection === 'online') {
                        statusEl.textContent = '🟢 OpenAI Online';
                        statusEl.classList.add('status-online');
                    } else {
                        throw new Error('Offline');
                    }
                } catch (e) {
                    statusEl.textContent = '🔴 Offline';
                    statusEl.classList.add('status-offline');
                }
            }

            async startWelcome() {
                this.toggleLoading(true);
                try {
                    const res = await this.apiCall('/api/welcome', {});
                    this.addMessage(res.message, 'assistant');
                    this.showOptions(res.options);
                } catch (e) {
                    this.addMessage("Errore di connessione al Backend.", 'error');
                }
                this.toggleLoading(false);
            }

            async handleChoice(choice) {
                this.addMessage(choice, 'user');
                this.toggleLoading(true);

                // Se inizia la quest
                if (choice.includes('Quest Begins') || choice.includes('Start the Quest')) {
                    this.startQuestStream();
                    return;
                }

                try {
                    const res = await this.apiCall('/api/chat', {
                        message: choice,
                        session_id: this.sessionId,
                        step: this.currentStep
                    });

                    this.currentStep = res.next_step || this.currentStep;
                    this.addMessage(res.message, 'assistant');

                    if (res.show_text_input) {
                        this.showTextInput(res.text_placeholder);
                    } else {
                        this.showOptions(res.options || []);
                    }

                } catch (e) {
                    this.addMessage("Errore: " + e.message, 'error');
                }
                this.toggleLoading(false);
            }

            // Gestione SSE per la generazione
            startQuestStream() {
                this.optionsContainer.innerHTML = ''; // Pulisci opzioni
                const source = new EventSource(`${API_BASE_URL}/api/generate-quest-stream?session=${this.sessionId}`);

                // UI Tracker
                const trackerId = 'tracker-' + Date.now();
                const trackerHTML = `
                    <div id="${trackerId}" class="progress-tracker">
                        <div class="progress-step" id="step-lore">LORE</div>
                        <div class="progress-step" id="step-pddl">PDDL</div>
                        <div class="progress-step" id="step-comments">FINALIZE</div>
                    </div>`;
                this.addRawHtml(trackerHTML, 'assistant');

                source.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    this.updateTracker(trackerId, data);

                    if (data.step === 'done') {
                        source.close();
                        this.toggleLoading(false);
                        setTimeout(() => window.location.href = data.redirect, 1500);
                    }
                };

                source.onerror = () => {
                    source.close();
                    this.toggleLoading(false);
                    this.addMessage("Errore durante la generazione.", 'error');
                };
            }

            updateTracker(trackerId, data) {
                if (data.step === 'done') return;
                const el = document.querySelector(`#${trackerId} #step-${data.step}`);
                if (el) {
                    if (data.status === 'running') el.className = 'progress-step running';
                    if (data.status === 'complete') el.className = 'progress-step complete';
                    if (data.status === 'error') el.className = 'progress-step error';
                }
            }

            // Helpers UI
            addMessage(html, type) {
                const div = document.createElement('div');
                div.className = `message ${type}-message`;
                div.innerHTML = html;
                this.chatMessages.appendChild(div);
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }

            addRawHtml(html, type) {
                this.addMessage(html, type);
            }

            showOptions(options) {
                this.optionsContainer.innerHTML = '';
                this.textInputContainer.classList.remove('active');

                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-button';
                    btn.innerText = opt;
                    btn.onclick = () => this.handleChoice(opt);
                    this.optionsContainer.appendChild(btn);
                });
            }

            showTextInput(placeholder) {
                this.optionsContainer.innerHTML = '';
                this.textInputContainer.classList.add('active');
                this.textInput.placeholder = placeholder || "Type here...";
                this.textInput.focus();
            }

            sendTextMessage() {
                const txt = this.textInput.value.trim();
                if (txt) {
                    this.textInput.value = '';
                    this.handleChoice(txt);
                }
            }

            async apiCall(url, body) {
                const res = await fetch(API_BASE_URL + url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                return await res.json();
            }

            toggleLoading(show) {
                this.isLoading = show;
                if(show) this.loadingOverlay.classList.add('active');
                else this.loadingOverlay.classList.remove('active');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.client = new QuestMasterClient();
        });

        function sendTextMessage() { window.client.sendTextMessage(); }
    </script>
</body>
</html>
