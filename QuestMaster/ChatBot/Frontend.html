<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestMaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url("../static/img/SfondoChatbot.png");
            background-size:cover ;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            height: 90vh;
            max-height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            background: linear-gradient(135deg, #7eddb2 0%, #5eb7ca 100%);
            color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .connection-status {
            position: absolute;
            top: 10px;
            right: 20px;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-online {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .status-offline {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            animation: slideIn 0.3s ease-out;
            line-height: 1.5;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .assistant-message {
            background: linear-gradient(135deg, #99d182 0%, #88e6cc 100%);
            color: #000000;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.3);
        }

        .user-message {
            background: linear-gradient(135deg, #6996bc 0%, #8ad3d8 100%);
            color: #000000;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        .error-message {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .input-area {
            padding: 20px;
            background: rgba(247, 250, 252, 0.8);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .text-input-container {
            display: none;
            margin-bottom: 15px;
            flex-direction: row;
            gap: 10px;
        }

        .text-input-container.active {
            display: flex;
        }

        .text-input-container input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .text-input-container input:focus {
            border-color: #73b1e4;
        }

        .send-button {
            background: linear-gradient(135deg, #e4b281 0%, #dc8a3f 100%);
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s ease;
            min-width: 80px;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .option-button {
            background: linear-gradient(135deg, #e4b281 0%, #dc8a3f 100%);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            min-width: 120px;
        }

        .option-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .option-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: rgba(108, 117, 125, 0.1);
            padding: 15px 20px;
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            max-width: 80px;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6c757d;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .status-bar {
            padding: 10px 20px;
            background: rgba(240, 242, 245, 0.9);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            font-size: 14px;
            color: #6c757d;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 5px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e4b281, #d37621);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                height: 95vh;
                margin: 10px;
            }

            .header h1 {
                font-size: 2em;
            }

            .message {
                max-width: 90%;
            }

            .option-button {
                min-width: 100px;
                font-size: 14px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="connection-status" id="connectionStatus">🔴 Offline</div>
            <h1>QuestMaster</h1>
            <p>Generatore di Storie Interattive a Logica Aumentata</p>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">

            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>

        <div class="input-area" id="inputArea">
            <div class="text-input-container" id="textInputContainer">
                <input type="text" id="textInput" placeholder="Scrivi il tuo messaggio...">
                <button class="send-button" id="sendButton" onclick="sendTextMessage()">Invia</button>
            </div>
            <div class="options-container" id="optionsContainer">

            </div>
        </div>

        <div class="status-bar">
            <div>Stato: <span id="statusText">Connessione in corso...</span></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <script>
        // Configurazione API
        const API_BASE_URL = 'http://localhost:5000';

        // Classe principale per gestire QuestMaster Frontend
        class QuestMasterClient {
            constructor() {
                this.currentStep = 'welcome';
                this.sessionId = 'session_' + Date.now();
                this.isLoading = false;

                // Elementi DOM
                this.elements = {
                    chatMessages: document.getElementById('chatMessages'),
                    typingIndicator: document.getElementById('typingIndicator'),
                    optionsContainer: document.getElementById('optionsContainer'),
                    textInputContainer: document.getElementById('textInputContainer'),
                    textInput: document.getElementById('textInput'),
                    sendButton: document.getElementById('sendButton'),
                    statusText: document.getElementById('statusText'),
                    progressFill: document.getElementById('progressFill'),
                    connectionStatus: document.getElementById('connectionStatus'),
                    loadingOverlay: document.getElementById('loadingOverlay')
                };

                this.init();
            }

            async init() {
                console.log('🎮 Inizializzazione QuestMaster Client...');

                // Setup event listeners
                this.setupEventListeners();

                // Controlla connessione
                await this.checkConnection();

                // Avvia conversazione
                await this.startWelcome();
            }

            setupEventListeners() {
                // Enter key per input testuale
                this.elements.textInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendTextMessage();
                    }
                });

                // Controllo stato connessione periodico
                setInterval(() => this.checkConnection(), 30000);
            }

            async checkConnection() {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/health`, {
                        method: 'GET',
                        timeout: 5000
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.updateConnectionStatus(true, data.ollama);
                    } else {
                        this.updateConnectionStatus(false);
                    }
                } catch (error) {
                    console.error('Errore controllo connessione:', error);
                    this.updateConnectionStatus(false);
                }
            }

            updateConnectionStatus(isOnline, ollamaStatus = 'unknown') {
                const statusEl = this.elements.connectionStatus;

                if (isOnline && ollamaStatus === 'online') {
                    statusEl.textContent = '🟢 Online';
                    statusEl.className = 'connection-status status-online';
                } else {
                    statusEl.textContent = '🔴 Offline';
                    statusEl.className = 'connection-status status-offline';
                }
            }

            async startWelcome() {
                this.setLoading(true);
                this.updateStatus('Connessione al sistema LLM...', 10);

                try {
                    const response = await this.apiCall('/api/welcome', {});

                    if (response.success) {
                        await this.showAssistantMessage(response.message);
                        this.showOptions(response.options);
                        this.updateStatus('In attesa della scelta dell\'utente...', 20);
                    } else {
                        throw new Error(response.error || 'Errore sconosciuto');
                    }
                } catch (error) {
                    console.error('Errore welcome:', error);
                    await this.showErrorMessage('Impossibile connettersi al server. Assicurati che il backend sia avviato su localhost:5000');
                    this.updateStatus('Errore di connessione', 0);
                } finally {
                    this.setLoading(false);
                }
            }

            async handleUserChoice(choice) {
                if (this.isLoading) return;

                this.addUserMessage(choice);
                this.showTyping();
                this.setLoading(true);

                try {
                    const requestData = {
                        message: choice,
                        session_id: this.sessionId,
                        step: this.currentStep
                    };

                    const response = await this.apiCall('/api/chat', requestData);

                    if (response.success) {
                        await this.processResponse(response);
                    } else {
                        throw new Error(response.error || 'Errore nella risposta del server');
                    }

                } catch (error) {
                    console.error('Errore chat:', error);
                    await this.showErrorMessage(`Errore: ${error.message}`);
                } finally {
                    this.hideTyping();
                    this.setLoading(false);
                }
            }

            async processResponse(response) {
                // Mostra il messaggio dell'assistente
                await this.showAssistantMessage(response.message);

                // Aggiorna lo step corrente
                if (response.next_step) {
                    this.currentStep = response.next_step;
                }

                // Gestisci le opzioni
                if (response.options && response.options.length > 0) {
                    this.showOptions(response.options);
                }

                // Gestisci input testuale
                if (response.show_text_input) {
                    const placeholder = response.text_placeholder || 'Scrivi il tuo messaggio...';
                    this.showTextInput(placeholder);
                }

                // Aggiorna barra di progresso
                this.updateProgressBasedOnStep();

                // Se quest completata
                if (response.quest_ready) {
                    console.log('Quest configurata:', response.config);
                    this.updateStatus('Quest pronta per essere avviata!', 100);
                } else {
                    this.updateStatus(this.getStatusForStep(this.currentStep), this.getProgressForStep(this.currentStep));
                }
            }

            async apiCall(endpoint, data) {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                return await response.json();
            }

            // Metodi UI
            async showAssistantMessage(message) {
                await this.delay(300);
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message assistant-message';
                messageDiv.innerHTML = this.formatMessage(message);
                this.elements.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
                this.hideOptions();
            }

            async showErrorMessage(message) {
                await this.delay(300);
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message error-message';
                messageDiv.innerHTML = `${message}`;
                this.elements.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            addUserMessage(message) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user-message';
                messageDiv.textContent = message;
                this.elements.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
                this.hideOptions();
                this.hideTextInput();
            }

            showOptions(options) {
                this.elements.optionsContainer.innerHTML = '';

                options.forEach(option => {
                    const button = document.createElement('button');
                    button.className = 'option-button';
                    button.textContent = option;
                    button.onclick = () => this.handleUserChoice(option);

                    if (this.isLoading) {
                        button.disabled = true;
                    }

                    this.elements.optionsContainer.appendChild(button);
                });
            }

            hideOptions() {
                this.elements.optionsContainer.innerHTML = '';
            }

            showTextInput(placeholder = "Scrivi il tuo messaggio...") {
                this.elements.textInput.placeholder = placeholder;
                this.elements.textInput.value = '';
                this.elements.textInputContainer.classList.add('active');
                this.elements.textInput.focus();

                // Aggiorna stato bottone
                this.elements.sendButton.disabled = this.isLoading;
            }

            hideTextInput() {
                this.elements.textInputContainer.classList.remove('active');
            }

            sendTextMessage() {
                if (this.isLoading) return;

                const message = this.elements.textInput.value.trim();
                if (message) {
                    this.handleUserChoice(message);
                }
            }

            showTyping() {
                this.elements.typingIndicator.classList.add('active');
                this.scrollToBottom();
            }

            hideTyping() {
                this.elements.typingIndicator.classList.remove('active');
            }

            setLoading(loading) {
                this.isLoading = loading;

                // Aggiorna overlay
                if (loading) {
                    this.elements.loadingOverlay.classList.add('active');
                } else {
                    this.elements.loadingOverlay.classList.remove('active');
                }

                // Aggiorna bottoni
                const buttons = document.querySelectorAll('.option-button, .send-button');
                buttons.forEach(btn => btn.disabled = loading);
            }

            updateStatus(text, progress) {
                this.elements.statusText.textContent = text;
                this.elements.progressFill.style.width = progress + '%';
            }

            scrollToBottom() {
                setTimeout(() => {
                    this.elements.chatMessages.scrollTop = this.elements.chatMessages.scrollHeight;
                }, 100);
            }

            formatMessage(message) {
                return message
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/\n/g, '<br>');
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            getStatusForStep(step) {
                const statusMap = {
                    'welcome': 'In attesa della modalità...',
                    'genre_selection': 'Selezione del genere...',
                    'custom_genre': 'Genere personalizzato...',
                    'length_selection': 'Definizione della lunghezza...',
                    'tone_selection': 'Scelta del tono narrativo...',
                    'graphics_selection': 'Modalità grafica...',
                    'theme_input': 'Definizione del tema...',
                    'final_confirmation': 'Configurazione completata...'
                };
                return statusMap[step] || 'In elaborazione...';
            }

            getProgressForStep(step) {
                const progressMap = {
                    'welcome': 20,
                    'genre_selection': 30,
                    'custom_genre': 35,
                    'length_selection': 50,
                    'tone_selection': 65,
                    'graphics_selection': 80,
                    'theme_input': 90,
                    'final_confirmation': 95
                };
                return progressMap[step] || 25;
            }

            updateProgressBasedOnStep() {
                const progress = this.getProgressForStep(this.currentStep);
                const status = this.getStatusForStep(this.currentStep);
                this.updateStatus(status, progress);
            }
        }

        // Funzione globale per compatibilità
        function sendTextMessage() {
            if (window.questMasterClient) {
                window.questMasterClient.sendTextMessage();
            }
        }

        // Inizializzazione quando la pagina è caricata
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Caricamento QuestMaster Frontend...');
            window.questMasterClient = new QuestMasterClient();
        });

        // Gestione errori globali
        window.addEventListener('error', (event) => {
            console.error('Errore JavaScript:', event.error);
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('Promise rejettata:', event.reason);
        });
    </script>
</body>
</html>
