bloccate e la minaccia alle spalle, ogni passo diventa una corsa contro il tempo e la vita."}, {"id": "3.1.1.1.1", "type": "consequence", "depth": 4, "indent": 4, "text": "Il dispositivo di disturbo emette un ronzio assordante, avvolgendo l'area in un caos elettronico. I mercenari, disorientati, iniziano a sparare a caso, colpendo i container e creando un varco tra le ombre. Tuttavia, tra il fracasso, il leader mascherato ride con una voce glaciale, rivelando che aveva previsto questa mossa e che un altro gruppo sta già accorrendo per bloccare ogni via di fuga.", "parent_context": "Nel cuore di New Eden City, il protagonista si trova in un deposito abbandonato, illuminato solo da luci al neon pulsanti e da ombre danzanti. Il rumore di passi furtivi echeggia tra i container metallici, mentre un drone di sorveglianza sfreccia sopra la sua testa, pronto a rivelare ogni mossa. Con un pacchetto di dati rubato tra le mani, sa che la sua prossima mossa potrebbe essere l'ultima: muoversi verso il negozio o affrontare i suoi inseguitori. -> Scivolare silenziosamente tra i container per sfuggire al drone. -> Mentre il protagonista si muove furtivamente tra i container, il drone si distrae, ma un rumore improvviso fa vibrare l'aria: un gruppo di mercenari, guidati da una figura mascherata, emerge dall'ombra, armati e pronti a bloccare la fuga. La tensione cresce quando il loro leader, un ex alleato, rivela di conoscere il pacchetto di dati e la verità dietro il tradimento. Con le uscite bloccate e la minaccia alle spalle, ogni passo diventa una corsa contro il tempo e la vita. -> Attivare il dispositivo di disturbo per disorientare i mercenari."}, {"id": "3.1.1.2", "type": "choice", "depth": 3, "indent": 3, "text": "Fuggire verso un'apertura nel muro per sfuggire ai mercenari.", "parent_context": "Nel cuore di New Eden City, il protagonista si trova in un deposito abbandonato, illuminato solo da luci al neon pulsanti e da ombre danzanti. Il rumore di passi furtivi echeggia tra rumore improvviso fa vibrare l'aria: un gruppo di mercenari, guidati da una figura mascherata, emerge dall'ombra, armati e pronti a bloccare la fuga. La tensione cresce quando il loro leader, un ex alleato, rivela di conoscere il pacchetto di dati e la verità dietro il tradimento. Con le uscite bloccate e la minaccia alle spalle, ogni passo diventa una corsa contro il tempo e la vita. -> Fuggire verso un'apertura nel muro per sfuggire ai mercenari."}, {"id": "3.2", "type": "choice", "depth": 1, "indent": 1, "text": "Attivare un jammer per disabilitare il drone di sorveglianza.", "parent_context": "Nel cuore di New Eden City, il protagonista si trova in un deposito abbandonato, illuminato solo da luci al neon pulsanti e da ombre danzanti. Il rumore di passi furtivi echeggia tra i container metallici, mentre un drone di sorveglianza sfreccia sopra la sua testa, pronto a rivelare ogni mossa. Con un pacchetto di dati rubato tra le mani, sa che la sua prossima mossa potrebbe essere l'ultima: muoversi verso il negozio o affrontare i suoi inseguitori."}, {"id": "3.2.1", "type": "consequence", "depth": 2, "indent": 2, "text": "Il jammer emette un ronzio sordo, silenziando il drone che, privo di controllo, si schianta contro un container, scatenando un'esplosione di scintille. Ma nel caos, un gruppo di cacciatori di taglie, attirati dal rumore, si avvicina, le loro ombre minacciose si allungano tra le luci al neon. Ora il protagonista deve scegliere se affrontarli o cercare una via di fuga tra i resti della metropoli decadente.", "parent_context": "Nel cuore di New Eden City, il protagonista si trova in un deposito abbandonato, illuminato solo da luci al neon pulsanti e da ombre danzanti. Il rumore di passi furtivi echeggia tra i container metallici, mentre un drone di sorveglianza sfreccia sopra la sua testa, pronto a rivelare ogni mossa. Con un pacchetto di dati rubato tra le mani, sa che la sua prossima mossa potrebbe essere l'ultima: muoversi verso il negozio o affrontare i suoi inseguitori. -> Attivare un jammer per disabilitare il drone di sorveglianza."}, {"id": "3.2.1.1", "type": "choice", "depth": 3, "indent": 3, "text": "Scivolare silenziosamente dietro un container per nascondersi.", "parent_context": "Nel cuore di New Eden City, il protagonista si trova in un deposito abbandonato, illuminato solo da luci al neon pulsanti e da ombre danzanti. Il rumore di passi furtivi echeggia tra i container metallici, mentre un drone di sorveglianza sfreccia sopra la sua testa, pronto a rivelare ogni mossa. Con un pacchetto di dati rubato tra le mani, sa che la sua prossima mossa potrebbe essere l'ultima: muoversi verso il negozio o affrontare i suoi inseguitori. -> Attivare un jammer per disabilitare il drone di sorveglianza. -> Il jammer emette un ronzio sordo, silenziando il drone che, privo di controllo, si schianta contro un container, scatenando un'esplosione di scintille. Ma nel caos, un gruppo di cacciatori di taglie, attirati dal rumore, si avvicina, le loro ombre minacciose si allungano tra le luci al neon. Ora il protagonista deve scegliere se affrontarli o cercare una via di fuga tra i resti della metropoli decadente."}, {"id": "3.2.1.1.1", "type": "consequence", "depth": 4, "indent": 4, "text": "Mentre il protagonista si nasconde, il gruppo di cacciatori di taglie avanza, frugando tra i detriti con una calma inquietante. Una figura emergente, un ex-agente della corporazione con un occhio cibernetico, riconosce il suo stile e inizia a cercarlo, promettendo vendetta. Il battito del cuore del protagonista accelera: la fuga è diventata una corsa contro il tempo, e il suo segreto potrebbe non rimanere tale a lungo.", "parent_context": "Nel cuore di New Eden City, il protagonista si trova in un deposito abbandonato, illuminato solo da luci al neon pulsanti e da ombre danzanti. Il rumore di passi furtivi echeggia tra i container metallici, mentre un drone di sorveglianza sfreccia sopra la sua testa, pronto a rivelare ogni mossa. Con  Prossima: (unload package2 truck shop)"}, {"id": "4.1", "type": "choice", "depth": 1, "indent": 1, "text": "Scivola silenziosamente verso il camion per esaminare i pacchi.", "parent_context": "Nel cuore di New Eden City, il protagonista si muove furtivo tra i resti di un deposito abbandonato, illuminato solo dai neon pulsanti e dai riflessi metallici delle macerie. Un camion, carico di pacchi misteriosi, attende di essere svuotato mentre ombre indistinte si aggirano, pronte a rivelare segreti letali. Il ticchettio incessante di un dispositivo di tracciamento lo spinge a decidere: affrontare i suoi inseguitori o scoprire cosa si nasconde davvero nei pacchi."}, {"id": "4.1.1", "type": "consequence", "depth": 2, "indent": 2, "text": "Mentre si avvicina al camion, un rumore metallico lo fa rabbrividire: un drone di sorveglianza emerge dall'ombra, i suoi occhi rossi fissati su di lui. Con un balzo, il protagonista riesce a nascondersi dietro un cumulo di detriti, ma il drone emette un segnale di allerta, attirando l'attenzione di una gang locale, nota per le sue pratiche spietate. In questo momento critico, dovrà decidere se affrontare il drone o cercare un'uscita prima che la gang arrivi.", "parent_context": "Nel cuore di New Eden City, il protagonista si muove furtivo tra i resti di un deposito abbandonato, illuminato solo dai neon pulsanti e dai riflessi metallici delle macerie. Un camion, carico di pacchi misteriosi, attende di essere svuotato mentre ombre indistinte si aggirano, pronte a rivelare segreti letali. Il ticchettio incessante di un dispositivo di tracciamento lo spinge a decidere: affrontare i suoi inseguitori o scoprire cosa si nasconde davvero nei pacchi. -> Scivola silenziosamente verso il camion per esaminare i pacchi."}, {"id": "4.1.1.1", "type": "choice", "depth": 3, "indent": 3, "text": "Attiva un dispositivo di disturbo per confondere il drone.", "parent_context": "Nel cuore di New Eden City, il protagonista si muove furtivo tra i resti di un dep er esaminare i pacchi. -> Mentre si avvicina al camion, un rumore metallico lo fa rabbrividire: un drone di sorveglianza emerge dall'ombra, i suoi occhi rossi fissati su di lui. Con un balzo, il protagonista riesce a nascondersi dietro un cumulo di detriti, ma il drone emette un segnale di allerta, attirando l'attenzione di una gang locale, nota per le sue pratiche spietate. In questo momento critico, dovrà decidere se affrontare il drone o cercare un'uscita prima che la gang arrivi. -> Attiva un dispositivo di disturbo per confondere il drone."}, {"id": "4.1.1.2", "type": "choice", "depth": 3, "indent": 3, "text": "Spara un colpo preciso al drone per disattivarlo.", "parent_context": "Nel cuore di New Eden City, il protagonista si muove furtivo tra i resti di un deposito abbandonato, illuminato solo dai neon pulsanti e dai riflessi metallici delle macerie. Un camion, carico di pacchi misteriosi, attende di essere svuotato mentre ombre indistinte si aggirano, pronte a rivelare segreti letali. Il ticchettio incessante di un dispositivo di tracciamento lo spinge a decidere: affrontare i suoi inseguitori o scoprire cosa si nasconde davvero nei pacchi. -> Scivola silenziosamente verso il camion per esaminare i pacchi. -> Mentre si avvicina al camion, un rumore metallico lo fa rabbrividire: un drone di sorveglianza emerge dall'ombra, i suoi occhi rossi fissati su di lui. Con un balzo, il protagonista riesce a nascondersi dietro un cumulo di detriti, ma il drone emette un segnale di allerta, attirando l'attenzione di una gang locale, nota per le sue pratiche spietate. In questo momento critico, dovrà decidere se affrontare il drone o cercare un'uscita prima che la gang arrivi."}, {"id": "4.1.1.2.1", "type": "consequence", "depth": 4, "indent": 4, "text": "Il proiettile colpisce il drone, che esplode in una pioggia di scintille e metallo, ma il rumore attira immediatamente l'attenzione della gang, i cui membri iniziano a circondare il deposito. Proprio quando il protagonis oprire cosa si nasconde davvero nei pacchi."}, {"id": "4.2.1", "type": "consequence", "depth": 2, "indent": 2, "text": "Il dispositivo emette un segnale disturbante che irradia onde sonore, creando un caos tra le ombre. Gli inseguitori, confusi, si dividono, ma uno di loro, un ex-agente del governo con un occhio cibernetico, percepisce la verità e inizia a seguire il protagonista. Mentre si fa strada tra i pacchi, il protagonista scopre un messaggio criptato che potrebbe rivelare il segreto di New Eden City, ma il tempo stringe e il cacciatore è sempre più vicino.", "parent_context": "Nel cuore di New Eden City, il protagonista si muove furtivo tra i resti di un deposito abbandonato, illuminato solo dai neon pulsanti e dai riflessi metallici delle macerie. Un camion, carico di pacchi misteriosi, attende di essere svuotato mentre ombre indistinte si aggirano, pronte a rivelare segreti letali. Il ticchettio incessante di un dispositivo di tracciamento lo spinge a decidere: affrontare i suoi inseguitori o scoprire cosa si nasconde davvero nei pacchi. -> Attiva il dispositivo di tracciamento per confondere i tuoi inseguitori."}, {"id": "4.2.1.1", "type": "choice", "depth": 3, "indent": 3, "text": "Svela il contenuto di un pacco misterioso per scoprire informazioni.", "parent_context": "Nel cuore di New Eden City, il protagonista si muove furtivo tra i resti di un deposito abbandonato, illuminato solo dai neon pulsanti e dai riflessi metallici delle macerie. Un camion, carico di pacchi misteriosi, attende di essere svuotato mentre ombre indistinte si aggirano, pronte a rivelare segreti letali. Il ticchettio incessante di un dispositivo di tracciamento lo spinge a decidere: affrontare i suoi inseguitori o scoprire cosa si nasconde davvero nei pacchi. -> Attiva il dispositivo di tracciamento per confondere i tuoi inseguitori. -> Il dispositivo emette un segnale disturbante che irradia onde sonore, creando un caos tra le ombre. Gli inseguitori, confusi, si dividono, ma uno         class Game {
            constructor() {
                this.actionIdx = 0;
                this.nodePath = [];
                this.init();
            }

            init() {
                this.nodePath = [0]; // Indice del nodo radice
                this.render();
            }

            getAction() {
                return storyData.actions[this.actionIdx];
            }

            getNode(idx) {
                const action = this.getAction();
                if (!action || !action.nodes) return null;
                return action.nodes[idx];
            }

            getCurrentNode() {
                const nodeIdx = this.nodePath[this.nodePath.length - 1];
                return this.getNode(nodeIdx);
            }

            // Trova i figli di un nodo basato sulla struttura
            getChildren() {
                const action = this.getAction();
                const currentNode = this.getCurrentNode();
                if (!currentNode) return [];

                const currentDepth = currentNode.depth;
                const children = [];

                // Cerca i nodi con depth + 1
                for (let i = 0; i < action.nodes.length; i++) {
                    const node = action.nodes[i];
                    if (node.depth === currentDepth + 1) {
                        // Verifica che sia effettivamente un figlio (stesso prefisso ID)
                        const currPrefix = currentNode.id.split('.').slice(0, -1).join('.');
                        const nodePrefix = node.id.split('.').slice(0, -1).join('.');

                        if (currPrefix === nodePrefix || currentNode.id.endsWith('.' + node.id.split('.')[node.id.split('.').length - 2])) {
                            children.push({idx: i, node: node});
                        }
                    }
                }

                return children;
            }

            selectChoice(idx) {
                this.nodePath.push(idx);
                this.render();
                window.scrollTo(0, 0);
            }

            nextAction() {
                if (this.actionIdx < storyData.actions.length - 1) {
                    this.actionIdx++;
                    this.nodePath = [0];
                    this.render();
                    window.scrollTo(0, 0);
                }
            }

            isEnded() {
                const children = this.getChildren();
                return children.length === 0 && this.actionIdx >= storyData.actions.length - 1;
            }

            canContinue() {
                const children = this.getChildren();
                return children.length === 0 && this.actionIdx < storyData.actions.length - 1;
            }

            render() {
                const gameDiv = document.getElementById('game');
                gameDiv.innerHTML = '';

                const currentNode = this.getCurrentNode();
                if (!currentNode) {
                    gameDiv.innerHTML = '<p style="color: red;">Errore: Nodo non trovato</p>';
                    return;
                }

                const box = document.createElement('div');
                box.className = 'scene-box';

                // Titolo
                const title = document.createElement('div');
                title.className = 'scene-title';
                title.textContent = `[ACT ${this.actionIdx + 1}] ${currentNode.type.toUpperCase()}`;
                box.appendChild(title);

                // Progress
                const totalNodes = storyData.actions.reduce((sum, a) => sum + a.nodes.length, 0);
                const currentNodeGlobal = this.actionIdx * 13 + this.nodePath.length;
                const progress = Math.min((currentNodeGlobal / totalNodes) * 100, 100);

                const progressDiv = document.createElement('div');
                progressDiv.className = 'progress';
                const fill = document.createElement('div');
                fill.className = 'progress-fill';
                fill.style.width = progress + '%';
                progressDiv.appendChild(fill);
                box.appendChild(progressDiv);

                // Testo scena
                const text = document.createElement('div');
                text.className = 'scene-text';
                text.textContent = currentNode.text;
                box.appendChild(text);

                // Scelte o prosecuzione
                const children = this.getChildren();

                if (children.length > 0) {
                    const choicesDiv = document.createElement('div');
                    choicesDiv.className = 'choices';

                    children.forEach(child => {
                        const btn = document.createElement('button');
                        btn.className = 'btn';
                        btn.textContent = '▶ ' + child.node.text;
                        btn.onclick = () => this.selectChoice(child.idx);
                        choicesDiv.appendChild(btn);
                    });

                    box.appendChild(choicesDiv);
                } else if (this.canContinue()) {
                    const choicesDiv = document.createElement('div');
                    choicesDiv.className = 'choices';
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.textContent = '▶ PROSSIMA AZIONE';
                    btn.onclick = () => this.nextAction();
                    choicesDiv.appendChild(btn);
                    box.appendChild(choicesDiv);
                } else if (this.isEnded()) {
                    const ending = document.createElement('div');
                    ending.className = 'ending';
                    ending.innerHTML = `
                        <h2>⚡ MISSIONE COMPLETATA ⚡</h2>
                        <p>Hai concluso la tua storia a New Eden City.</p>
                        <button class="restart" onclick="location.reload()">RIAVVIA</button>
                    `;
                    box.appendChild(ending);
                }

                // Metadata
                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = `ID: ${currentNode.id} | Profondità: ${currentNode.depth} | Tipo: ${currentNode.type}`;
                box.appendChild(meta);

                gameDiv.appendChild(box);
            }
        }

        // Avvia il gioco
        const game = new Game();
    </script>
