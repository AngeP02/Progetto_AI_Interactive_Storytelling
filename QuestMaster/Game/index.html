<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestMaster - GPT Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url("SfondoChatbot.png");
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;  # CAMBIATO da column a row
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            flex-shrink: 0; 
            z-index: 10;
            width: 100%;
        }
        .main-body {
            display: flex;
            flex-direction: row;
            flex: 1;
            overflow: hidden;
            width: 100%;
        }
        .cover-container {
            flex: 1;
            min-width: 300px;
            max-width: 50%; /* Non occupa più del 50% */
            padding: 20px;
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.05) 0%, rgba(0, 242, 254, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-right: 1px solid rgba(0, 0, 0, 0.1); /* Bordo a destra verso la chat */
        }
        .cover-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            display: block;
        }
        .chat-container { 
            flex: 2; /* La chat prende più spazio se disponibile */
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            min-width: 300px;
            background: white;
        }
        
        .header h1 { font-size: 2.5em; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3); }
        .header p { opacity: 0.9; font-size: 1.1em; }
        
        .connection-status {
            position: absolute;
            top: 10px;
            right: 20px;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-online { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid white; }
        .status-offline { background: rgba(220, 53, 69, 0.8); color: white; }

        /* Chat Styles */
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .message { max-width: 80%; padding: 15px 20px; border-radius: 18px; animation: slideIn 0.3s ease-out; line-height: 1.5; word-wrap: break-word; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .assistant-message { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #000; align-self: flex-start; border-bottom-left-radius: 5px; border: 1px solid #e1e8ed; }
        .user-message { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
        .error-message { background: #ff6b6b; color: white; align-self: flex-start; }
        
        /* Input Area */
        .input-area { padding: 20px; background: rgba(247, 250, 252, 0.9); border-top: 1px solid rgba(0,0,0,0.1); }
        .text-input-container { display: none; margin-bottom: 15px; flex-direction: row; gap: 10px; }
        .text-input-container.active { display: flex; }
        .text-input-container input { flex: 1; padding: 12px 15px; border: 2px solid #e1e8ed; border-radius: 25px; font-size: 16px; outline: none; }
        .send-button { background: #4facfe; color: white; border: none; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .send-button:hover { background: #00f2fe; transform: translateY(-2px); transition: 0.3s; }

        .options-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .option-button {
            background: white; color: #4facfe; border: 2px solid #4facfe;
            padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .option-button:hover { background: #4facfe; color: white; transform: translateY(-2px); }

        /* Loading & Progress */
        .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .loading-overlay.active { display: flex; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .progress-tracker { display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 10px; margin-bottom: 15px; width: 100%; }
        .progress-step { display: flex; flex-direction: column; align-items: center; font-size: 0.8em; opacity: 0.5; }
        .progress-step.running { opacity: 1; color: #e67e22; font-weight: bold; }
        .progress-step.complete { opacity: 1; color: #27ae60; font-weight: bold; }
        .progress-step.error { opacity: 1; color: #c0392b; font-weight: bold; }

        /* Modal API Key */
        .api-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }
        .api-modal-overlay.active { display: flex; }
        .api-modal {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .api-modal h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        .api-modal input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
            font-family: monospace;
        }
        .api-modal input:focus { border-color: #4facfe; }
        .api-modal button {
            width: 100%;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .api-modal button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3); }

        /* PDF Button */
        .pdf-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .pdf-button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="api-modal-overlay" id="apiModalOverlay">
        <div class="api-modal">
            <h2>OpenAI API Key</h2>
            <input type="password" id="apiKeyInput" placeholder="sk-...">
            <button onclick="saveApiKey()">Avvia Avventura</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="connection-status" id="connectionStatus">🟢 OpenAI Online</div>
            <h1>QuestMaster AI</h1>
            <p>GPT Adventure Engine</p>
        </div>
        
        <div class="main-body">
            <div class="cover-container" id="coverContainer" style="display: none;"></div>

            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="input-area">
                    <div class="options-container" id="optionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MODEL_ID = "gpt-4o"; 
        const QUEST_PLAN = `\`\`\`markdown
# SCENARIO GUIDA: Il Caso dell'Aurora Oscura

## 1. CONTESTO NARRATIVO
Benvenuti a Neo-Eden, una metropoli high-tech che non dorme mai e non dimentica mai. In questo mondo dove le corporazioni hanno sostituito i governi e la tecnologia è il potere supremo, impersoni il Detective Jack Harris. Un investigatore duro con un debole per il whisky economico, Jack si trova a risolvere l'omicidio della famosa AI pop star Aurora Wynter. Con un tono umoristicamente oscuro e una punta di angoscia esistenziale, navigherai l'intricato sottobosco di Neo-Eden per scoprire la verità.

## 2. STATO INIZIALE
- **Luogo di partenza:** Il tuo ufficio al dipartimento di polizia di Neo-Eden
- **Inventario Iniziale:** Taccuino, registratore vocale, badge da detective
- **Elementi Chiave nella stanza:** Scrivania con computer, finestra che si affaccia sulla città piovosa, bacheca con foto e indizi

## 3. REGOLE DEL MONDO (Logica Semplificata)
- **Muoversi:** Se il veicolo è in un luogo e il luogo è connesso a un altro, allora puoi spostarti nel luogo connesso.
- **Caricare:** Se un pacco è in un luogo e il veicolo è nello stesso luogo, allora puoi caricare il pacco nel veicolo.
- **Scaricare:** Se un pacco è nel veicolo e il veicolo è in un luogo, allora puoi scaricare il pacco nel luogo.

## 4. OBIETTIVO FINALE (GOAL)
Scoprire l'identità dell'assassino di Aurora Wynter e comprendere il valore del suo ultimo album che ha portato alla sua morte.

## 5. SEQUENZA DI EVENTI (Suggerita)
1. Inizia nell'ufficio e raccogli i primi indizi.
2. Visita il deposito per raccogliere informazioni aggiuntive.
3. Interagisci con il personaggio chiave Dr. Elara Vex per ottenere informazioni cruciali.
4. Raggiungi il negozio per scoprire dettagli nascosti sull'album di Aurora.
5. Raccogli prove nel Red Zone e confronta Victor LaGraine.
6. Unisci i pezzi del puzzle per identificare l'assassino e il movente.

## 6. VINCOLI DI GIOCO
- **MaxDepth:** 1
- **Branching:** 2
\`\`\`
`;
        const COVER_IMAGE_URL = "";
        const MAX_TURNS = 1;
        const STD_BRANCHING = 2; 

        let apiKey = "{API_KEY}";
        let chatHistory = [];
        let turnCount = 0;
        let isGameOver = false;

        window.onload = function() {
            if (!apiKey) {
                const stored = localStorage.getItem("openai_api_key");
                if (stored) { 
                    apiKey = stored; 
                    startGame(); 
                } else { 
                    document.getElementById('apiModalOverlay').classList.add('active'); 
                }
            } else { 
                startGame(); 
            }
        };

        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if(val) { 
                apiKey = val; 
                localStorage.setItem("openai_api_key", val);
                document.getElementById('apiModalOverlay').classList.remove('active');
                startGame(); 
            }
        }

        function startGame() {
            document.getElementById('chatMessages').innerHTML = '';
            turnCount = 0;
            isGameOver = false;
            if (COVER_IMAGE_URL) {
                addCoverImage(COVER_IMAGE_URL);
            }
            callGPT("Inizia l'avventura. Descrivi lo scenario iniziale.", true);
        }

        function buildSystemPrompt() {
            let turnsLeft = MAX_TURNS - turnCount;

            if (turnsLeft <= 0) {
                return `Sei il Dungeon Master. STOP AL GIOCO.

                IL TEMPO È SCADUTO. DEVI CONCLUDERE ORA.
                1. Genera un paragrafo conclusivo basato sugli obiettivi raggiunti o falliti.
                2. L'array "choices" DEVE ESSERE VUOTO []. Non generare nessuna scelta.

                JSON FORMAT:
                {
                    "description": "<h1>FINE</h1> <p>Testo dell'epilogo...</p>",
                    "choices": [] 
                }`;
            }

            let pacingInstruction = "Ritmo normale.";

            if (turnsLeft <= 2) {
                pacingInstruction = `URGENZA ESTREMA: Mancano solo ${turnsLeft} passi.
                Qualsiasi scelta tu generi DEVE portare inevitabilmente verso la conclusione del Goal.
                Non permettere deviazioni. Se l'utente sceglie A, B o C, il risultato deve comunque avvicinarlo al finale.
                Elimina le opzioni esplorative. Solo azioni risolutive.`;
            } 
            else if (turnCount >= MAX_TURNS / 2) {
                pacingInstruction = "Inizia a guidare il giocatore verso l'obiettivo.";
            }

            return `Sei il Dungeon Master.

            DOCUMENTAZIONE (Regole e Goal):
            ---
            ${QUEST_PLAN}
            ---

            STATO PARTITA:
            - Turno ${turnCount} di ${MAX_TURNS} (Mancano ${turnsLeft} turni).
            - ISTRUZIONE RIGIDA: ${pacingInstruction}

            COMPITI:
            1. Narra la storia.
            2. Genera ESATTAMENTE ${STD_BRANCHING} opzioni.
            3. Se il Goal è stato raggiunto in questo turno, lascia "choices" vuoto [] per terminare.

            JSON FORMAT:
            {
                "description": "Testo HTML story",
                "choices": [ { "text": "Label", "action": "Prompt action" } ]
            }
            `;
        }
        function addCoverImage(imageUrl) {
            const container = document.getElementById('coverContainer');
            const img = document.createElement('img');
            img.src = imageUrl;
            img.alt = 'Cover Art';
            img.onerror = () => {
                console.warn('Copertina non caricata:', imageUrl);
                container.style.display = 'none';
            };
            container.innerHTML = '';
            container.appendChild(img);
            container.style.display = 'flex';
        }
        async function callGPT(userAction, isStart = false) {
            showLoading();

            if (!isStart) turnCount++;

            let messages = [{ role: "system", content: buildSystemPrompt() }];
            const recentHistory = chatHistory.slice(-8);
            messages = messages.concat(recentHistory);
            messages.push({ role: "user", content: `AZIONE: ${userAction}` });

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: MODEL_ID,
                        messages: messages,
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const aiText = data.choices[0].message.content;
                const gameData = JSON.parse(aiText);

                if (!isStart) chatHistory.push({ role: "user", content: userAction });
                chatHistory.push({ role: "assistant", content: aiText });

                updateUI(gameData, userAction, isStart);

            } catch (error) {
                console.error(error);
                addMessage(error.message, 'error');
                showError();
            }
        }

        function showLoading() {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '<div style="color: #4facfe; text-align: center; padding: 10px;">Elaborazione...</div>';
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function updateUI(data, lastAction, isStart) {
            document.getElementById('loadingOverlay').classList.remove('active');

            if (!isStart) {
                addMessage(lastAction, 'user');
            }

            addMessage(data.description, 'assistant');

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            if (!data.choices || data.choices.length === 0) {
                isGameOver = true;

                const pdfBtn = document.createElement('button');
                pdfBtn.className = 'pdf-button';
                pdfBtn.innerHTML = 'Scarica Storia PDF';
                pdfBtn.onclick = downloadPDF;
                container.appendChild(pdfBtn);

                const restartBtn = document.createElement('button');
                restartBtn.className = 'option-button';
                restartBtn.innerHTML = 'Rigioca';
                restartBtn.onclick = () => location.reload();
                container.appendChild(restartBtn);

            } else {
                data.choices.forEach(c => {
                    const btn = document.createElement('button');
                    btn.className = 'option-button';
                    btn.innerText = c.text;
                    btn.onclick = () => callGPT(c.action);
                    container.appendChild(btn);
                });
            }
        }

        function addMessage(html, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-message`;
            div.innerHTML = html;
            document.getElementById('chatMessages').appendChild(div);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        function showError() {
            const container = document.getElementById('optionsContainer');
            const retryBtn = document.createElement('button');
            retryBtn.className = 'option-button';
            retryBtn.innerHTML = 'Riprova';
            retryBtn.onclick = () => location.reload();
            container.appendChild(retryBtn);
        }

        function downloadPDF() {
            const messages = document.querySelectorAll('.message');
            let fullText = 'LA MIA AVVENTURA\n\n' + '='.repeat(50) + '\n\n';
            
            messages.forEach((msg, index) => {
                if (msg.classList.contains('cover-message')) return;
                const isUser = msg.classList.contains('user-message');
                const label = isUser ? '[Tu]: ' : '[DM]: ';
                const text = msg.innerText || msg.textContent;
                fullText += label + text + '\n\n';
            });

            // Crea il PDF con jsPDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });

            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 10;
            const maxWidth = pageWidth - 2 * margin;
            const fontSize = 9; 
            const lineHeight = 7;
            let yPosition = margin;

            // Dividi il testo in linee
            const lines = doc.splitTextToSize(fullText, maxWidth);

            lines.forEach(line => {
                if (yPosition + lineHeight > pageHeight - margin) {
                    doc.addPage();
                    yPosition = margin;
                }
                doc.text(line, margin, yPosition);
                yPosition += lineHeight;
            });

            doc.save('La_Mia_Avventura.pdf');
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
