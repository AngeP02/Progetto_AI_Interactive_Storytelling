<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Eden Undercity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #f5f5f5;
            line-height: 1.8;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #ffd700;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        .progress {
            text-align: center;
            color: #ffd700;
            margin-bottom: 25px;
            font-size: 0.9em;
            padding: 12px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .story-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid #ffd700;
            min-height: 250px;
        }
        .state-desc {
            color: #a8c5e0;
            font-size: 0.9em;
            font-style: italic;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            border-left: 3px solid #a8c5e0;
        }
        .narrative {
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.9;
            color: #f5f5f5;
        }
        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }
        .choice-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid transparent;
            padding: 18px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.05em;
            text-align: left;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
        }
        .choice-btn:before {
            content: '→ ';
            margin-right: 8px;
            font-weight: bold;
        }
        .choice-btn:hover {
            transform: translateX(12px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
            border-color: #ffd700;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .goal-message {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 35px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.4em;
            margin-top: 25px;
            animation: fadeIn 0.8s ease;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }
        .restart-btn {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
        }
        .restart-btn:hover {
            background: #ffed4e;
            transform: scale(1.08);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>New Eden Undercity</h1>
        <div class="progress" id="progress"></div>
        <div class="story-content fade-in" id="storyContent">
            <div class="state-desc" id="stateDesc"></div>
            <div class="narrative" id="narrative"></div>
            <div class="choices" id="choices"></div>
        </div>
    </div>
    <script>
        const storyGraph = {
  "metadata": {
    "title": "New Eden Undercity",
    "total_nodes": 6
  },
  "nodes": {
    "start": {
      "state_description": "Current situation",
      "narrative": "You stood at the edge of the undercity, gazing up at the towering skyscrapers that seemed to pierce the smog-filled sky like shards of glass. Raven leaned against a dumpster, eyes fixed on you.\n\n'Kael, we've got problems.' she said, voice low and urgent. 'Omicron Innovations has sent their best goons to sniff out your hideout. You need to move, now.'",
      "is_goal": false,
      "choices": [
        {
          "description": "Grab Raven and make a run for it",
          "next_node": ""
        },
        {
          "description": "Tell Raven you're not leaving until you've finished planning the next heist",
          "next_node": ""
        },
        {
          "description": "Suggest heading to your safehouse to gather more info on Omicron's plans",
          "next_node": ""
        }
      ]
    },
    "node_1a": {
      "state_description": "Updated situation",
      "narrative": "You took off with Raven in a wild sprint, dodging pedestrians and leaping over obstacles. You finally reached the safety of your hideout, a cramped warehouse on the outskirts of the undercity.",
      "is_goal": false,
      "choices": [
        {
          "description": "Hack into Omicron's servers to gather intel on their plans",
          "next_node": ""
        },
        {
          "description": "Confront Raven about her motives and trustworthiness",
          "next_node": ""
        },
        {
          "description": "Take a moment to catch your breath and plan the next move",
          "next_node": ""
        }
      ]
    },
    "node_1b": {
      "state_description": "Updated situation",
      "narrative": "You made a beeline for Omicron's headquarters, hacking through security systems as you went. Inside, you found yourself face-to-face with the corporation's top executives.",
      "is_goal": false,
      "choices": [
        {
          "description": "Try to reason with them and convince them to call off their dogs",
          "next_node": ""
        },
        {
          "description": "Sneak past the guards and make a break for it",
          "next_node": ""
        },
        {
          "description": "Unleash your hacking fury and take down Omicron's system from the inside",
          "next_node": ""
        }
      ]
    },
    "node_1c": {
      "state_description": "Updated situation",
      "narrative": "You headed to the local black market, where you knew you could find a reliable source for information on Omicron's plans.",
      "is_goal": false,
      "choices": [
        {
          "description": "Meet with a shady dealer who claims to have inside info",
          "next_node": ""
        },
        {
          "description": "Bargain with a street vendor over the price of a rare component",
          "next_node": ""
        },
        {
          "description": "Get into a fight with a rival gang member over territory",
          "next_node": ""
        }
      ]
    },
    "goal_ending_1": {
      "state_description": "Mission complete",
      "narrative": "With Omicron's plans in hand, you devised a plan to infiltrate their facility and steal the datacore. You snuck past security, avoiding guards and cameras as you went. Finally, you reached the heart of the complex: a server room filled with row upon row of humming servers.",
      "is_goal": true,
      "choices": []
    },
    "goal_ending_2": {
      "state_description": "Mission complete",
      "narrative": "You managed to track down one of Omicron's executives, who was willing to defect and provide you with crucial information about the corporation's plans. With this intel, you were able to rally support from the underground resistance and stage a daring raid on Omicron's headquarters.",
      "is_goal": true,
      "choices": []
    }
  },
  "root": "start"
};
        let currentNode = storyGraph.root;
        let visitedNodes = new Set();

        function updateProgress() {
            visitedNodes.add(currentNode);
            const node = storyGraph.nodes[currentNode];
            document.getElementById('progress').innerHTML = 
                `Progress: ${visitedNodes.size}/${storyGraph.metadata.total_nodes} nodes explored`;
        }

        function renderNode(nodeId) {
            const node = storyGraph.nodes[nodeId];
            if (!node) {
                console.error('Node not found:', nodeId);
                return;
            }

            const content = document.getElementById('storyContent');
            content.classList.remove('fade-in');
            setTimeout(() => content.classList.add('fade-in'), 10);

            document.getElementById('stateDesc').textContent = node.state_description || '';
            document.getElementById('narrative').innerHTML = node.narrative;
            const choicesEl = document.getElementById('choices');
            choicesEl.innerHTML = '';

            updateProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (node.is_goal) {
                choicesEl.innerHTML = `
                    <div class="goal-message">
                        <h2>🎉 Quest Complete!</h2>
                        <p>You have successfully completed your mission.</p>
                    </div>
                    <button class="restart-btn" onclick="restart()">Play Again</button>
                `;
                return;
            }

            if (!node.choices || node.choices.length === 0) {
                choicesEl.innerHTML = `
                    <div class="goal-message">
                        <h2>The End</h2>
                    </div>
                    <button class="restart-btn" onclick="restart()">Restart</button>
                `;
                return;
            }

            node.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice.description;
                btn.onclick = () => {
                    currentNode = choice.next_node;
                    renderNode(currentNode);
                };
                choicesEl.appendChild(btn);
            });
        }

        function restart() {
            currentNode = storyGraph.root;
            visitedNodes.clear();
            renderNode(currentNode);
        }

        renderNode(currentNode);
    </script>
</body>
</html>
