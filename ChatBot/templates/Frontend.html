<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>QuestMaster - Configurazione</title>
    <style>
        body {
            font-family: sans-serif;
            /* Rimuovi max-width: 600px; e margin: 40px auto; dal body */
            margin: 0; /* Rimuovi i margini di default */
            min-height: 100vh; /* Assicura che lo sfondo sia sempre visibile */

            background-image: url('../static/img/SfondoChatbot.png');
            background-size: auto; /* Utilizziamo 'contain' per non tagliare i bordi dei libri */
            background-repeat: no-repeat;
            background-position: center; /* Centra l'immagine di sfondo */
            background-attachment: fixed;
            color: #333;

            /* FLexbox per centrare VERTICALMENTE e ORIZZONTALMENTE il contenuto */
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra orizzontalmente i figli */
            justify-content: center; /* Centra verticalmente i figli */
        }

        h1 {
            /* Nascondi o sposta il titolo se vuoi che solo il chat-box sia al centro */
            display: none;
        }

        .chat-box {
            max-width: 400px; /* <--- Limita la larghezza della chatbox per stare nel libro */
            width: 90%; /* Utile per i dispositivi più piccoli */
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            /* Rendi la chatbox semi-trasparente per vedere lo sfondo del libro */
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* Ombra per farla risaltare */
        }
        .message { background: #eee; padding: 10px; margin-bottom: 15px; border-radius: 5px; }
        .option-button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .option-button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Benvenuto in QuestMaster</h1>
    <div class="chat-box">
        <div class="message">
            <p>{{ message }}</p>
        </div>

        {% if options %}
            <p>Seleziona un genere per iniziare:</p>
            {% for option in options %}
                <button class="option-button"
                        onclick="alert('Hai scelto: {{ option }}. Prossima fase in sviluppo!')">
                    {{ option }}
                </button>
            {% endfor %}
        {% endif %}
    </div>

</body>
</html>
